#This is the one that updates the site every time the new daily file is downloaded

name: daily_update
on:
  workflow_run:
    workflows: ["fetch_daily"]
    types:
      - completed
      
env:
    TOKEN: ${{ secrets.SHINYAPPS_TOKEN }}
    SECRET: ${{ secrets.SHINYAPPS_SECRET_TOKEN }}

jobs:
  build:
    runs-on: ubuntu-latest
    # only deploy if the fetch actually succeeded; otherwise we'd push stale data
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
    - uses: actions/checkout@v5
    - uses: r-lib/actions/setup-r@v2
      with:
        r-version: '4.3.2'
        use-public-rspm: true # prebuilt binaries instead of compiling from source
    #- uses: r-lib/actions/setup-r-dependencies@v2
    #  with:
    #    cache-version: 2
    #    extra-packages: |
    #      any::rsconnect
    #      any::shiny
    #      any::dplyr
    #      any::ggplot2
    - name: Install Curl
      run: sudo apt-get install libcurl4-openssl-dev
    - name: Install R libraries
      run: |
        install.packages(c("rsconnect", "shiny", "dplyr", "ggplot2", "lifecycle", "scales"), dependencies=TRUE)
      shell: Rscript {0}
    - name: Push to site
      run: Rscript bin/upload_to_site.R "$TOKEN" "$SECRET"
