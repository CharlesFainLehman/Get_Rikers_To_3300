#Courtesy weide-zhou https://github.community/t/how-to-setup-github-actions-to-run-my-python-script-on-schedule/18335
#Courtesy yanjingzhu https://github.community/t/how-to-make-a-workflow-file-to-save-the-output-as-a-file-to-my-github-repo/18352/2

name: fetch_daily
#on: [push]

on:
  schedule:
    - cron: "25 4 * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.13'
        cache: 'pip'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r ./bin/requirements.txt
    - name: execute fetch script
      env:
        SOCRATA_APP_TOKEN: ${{ secrets.SOCRATA_APP_TOKEN }}
      run: python ./bin/fetch_dic.py
    - name: commit and push new file
      run: |
        git config --local user.name  ${{ github.actor }}
        git config --local user.email "${{ github.actor }}@users.noreply.github.com"
        git add -A
        # the upstream dataset isn't always refreshed by the time this runs;
        # an unchanged file is not an error, so only commit when there's something new
        git diff --staged --quiet || git commit -m "Updating daily file"
        git push
