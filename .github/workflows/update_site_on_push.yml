#This is the one that updates the site any time someone pushes manually to the main repo

name: update_site_on_push
#on: [push]
on: workflow_dispatch
env:
    TOKEN: ${{ secrets.SHINYAPPS_TOKEN }}
    SECRET: ${{ secrets.SHINYAPPS_SECRET_TOKEN }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5
    - uses: r-lib/actions/setup-r@v2
      with:
        r-version: '4.3.2'
        use-public-rspm: true # prebuilt binaries instead of compiling from source
    - name: Install Curl
      run: sudo apt-get install libcurl4-openssl-dev
    - name: Install R libraries
      run: |
        install.packages(c("rsconnect", "shiny", "dplyr", "ggplot2", "lifecycle", "scales"), dependencies=TRUE)
      shell: Rscript {0}
    - name: Push to site
      run: Rscript bin/upload_to_site.R "$TOKEN" "$SECRET"
